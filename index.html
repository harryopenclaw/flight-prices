<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Price Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1e1e2e',
            card: '#2a2a3c',
            border: '#3a3a4c',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #13131f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .price-cell { transition: transform 0.1s, box-shadow 0.1s; }
    .price-cell:hover { transform: scale(1.08); box-shadow: 0 0 12px rgba(255,255,255,0.15); z-index: 10; position: relative; }
    .grid-container { overflow-x: auto; }
    .grid-container::-webkit-scrollbar { height: 8px; }
    .grid-container::-webkit-scrollbar-track { background: #1e1e2e; border-radius: 4px; }
    .grid-container::-webkit-scrollbar-thumb { background: #4a4a5c; border-radius: 4px; }
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: #fff; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; white-space: nowrap; z-index: 20; border: 1px solid #3a3a4c;
      pointer-events: none;
    }
    .airline-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      margin-top: 2px;
      white-space: nowrap;
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <header class="max-w-7xl mx-auto mb-6">
    <h1 class="text-3xl md:text-4xl font-bold text-white">&#9992; Flight Price Dashboard</h1>
    <p class="text-gray-400 mt-1">Cheapest fares &middot; Apr 13 &ndash; May 3, 2026 &middot; Prices in CAD &middot; <span class="text-gray-500">Last updated: Mar 28, 2026</span></p>
    <p class="mt-2 text-sm text-yellow-400/80 bg-yellow-400/10 inline-block px-3 py-1 rounded-md">Prices are estimates based on historical patterns &mdash; click any route for live Google Flights prices.</p>
  </header>

  <!-- Route filters -->
  <div class="max-w-7xl mx-auto mb-4">
    <details class="bg-[#1e1e2e] rounded-lg border border-[#3a3a4c] p-3" open>
      <summary class="cursor-pointer text-sm font-semibold text-gray-300 select-none">Filter Routes</summary>
      <div id="filters" class="flex flex-wrap gap-3 mt-3"></div>
    </details>
  </div>

  <!-- Summary cards -->
  <div id="summary-cards" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

  <!-- Heatmap grid -->
  <div class="max-w-7xl mx-auto bg-[#1e1e2e] rounded-xl border border-[#3a3a4c] p-4 mb-6">
    <h2 class="text-lg font-semibold text-white mb-3">Price Calendar</h2>
    <div class="grid-container">
      <table id="heatmap" class="w-full text-xs md:text-sm"></table>
    </div>
  </div>

  <!-- Bar chart -->
  <div class="max-w-7xl mx-auto bg-[#1e1e2e] rounded-xl border border-[#3a3a4c] p-4 mb-8">
    <h2 class="text-lg font-semibold text-white mb-3">Cheapest Price by Route</h2>
    <div class="relative" style="max-height:350px">
      <canvas id="barChart"></canvas>
    </div>
  </div>

<script>
const flightData = {

      prices: {
        "Apr 13": 530, "Apr 14": 518, "Apr 15": 525, "Apr 16": 540, "Apr 17": 572,
        "Apr 18": 598, "Apr 19": 585, "Apr 20": 522, "Apr 21": 515, "Apr 22": 528,
        "Apr 23": 545, "Apr 24": 578, "Apr 25": 605, "Apr 26": 592, "Apr 27": 528,

    },

      prices: {
        "Apr 13": 145, "Apr 14": 138, "Apr 15": 142, "Apr 16": 152, "Apr 17": 172,
        "Apr 18": 188, "Apr 19": 182, "Apr 20": 140, "Apr 21": 135, "Apr 22": 145,
        "Apr 23": 155, "Apr 24": 175, "Apr 25": 190, "Apr 26": 185, "Apr 27": 142,

      link: "https://www.google.com/travel/flights/search?tfs=CBwQAhoeEgoyMDI2LTA0LTEzagcIARIDWUhacgcIARIDWVla&curr=CAD",
      prices: {

        "Apr 23": 640, "Apr 24": 678, "Apr 25": 718, "Apr 26": 702, "Apr 27": 612,

      }
    },

      id: "yyz-bda", from: "Toronto (YYZ)", to: "Bermuda (BDA)", airline: "Air Canada / United",

      prices: {
        "Apr 13": 398, "Apr 14": 390, "Apr 15": 395, "Apr 16": 412, "Apr 17": 445,
        "Apr 18": 472, "Apr 19": 458, "Apr 20": 392, "Apr 21": 385, "Apr 22": 400,
        "Apr 23": 418, "Apr 24": 450, "Apr 25": 478, "Apr 26": 462, "Apr 27": 395,
        "Apr 28": 388, "Apr 29": 405, "Apr 30": 425, "May 1": 455, "May 2": 482, "May 3": 468
      }
    },
    {
      id: "yul-bda", from: "Montreal (YUL)", to: "Bermuda (BDA)", airline: "Air Canada / United",
      link: "https://www.google.com/travel/flights/search?tfs=CBwQAhoeEgoyMDI2LTA0LTEzagcIARIDWVVMcgcIARIEQkRB&curr=CAD",
      prices: {
        "Apr 13": 458, "Apr 14": 445, "Apr 15": 452, "Apr 16": 470, "Apr 17": 505,
        "Apr 18": 535, "Apr 19": 520, "Apr 20": 450, "Apr 21": 442, "Apr 22": 458,
        "Apr 23": 478, "Apr 24": 512, "Apr 25": 542, "Apr 26": 528, "Apr 27": 455,
        "Apr 28": 448, "Apr 29": 465, "Apr 30": 485, "May 1": 518, "May 2": 548, "May 3": 532
      }
    },
    {
      id: "yul-bgi", from: "Montreal (YUL)", to: "Barbados (BGI)", airline: "Air Canada / WestJet",
      link: "https://www.google.com/travel/flights/search?tfs=CBwQAhoeEgoyMDI2LTA0LTEzagcIARIDWVVMcgcIARIEQkdJ&curr=CAD",
      prices: {
        "Apr 13": 552, "Apr 14": 540, "Apr 15": 548, "Apr 16": 568, "Apr 17": 605,
        "Apr 18": 638, "Apr 19": 625, "Apr 20": 545, "Apr 21": 535, "Apr 22": 552,
        "Apr 23": 575, "Apr 24": 612, "Apr 25": 645, "Apr 26": 630, "Apr 27": 548,
        "Apr 28": 542, "Apr 29": 560, "Apr 30": 580, "May 1": 618, "May 2": 652, "May 3": 638
      }
    }
  ]
};

const dates = Object.keys(flightData.routes[0].prices);
let visibleRoutes = new Set(flightData.routes.map(r => r.id));
let chartInstance = null;

function getRouteStats(route) {
  const entries = Object.entries(route.prices).filter(([, p]) => p !== null);
  if (!entries.length) return { min: null, max: null, minDate: null };
  const min = Math.min(...entries.map(([, p]) => p));
  const max = Math.max(...entries.map(([, p]) => p));
  const minDate = entries.find(([, p]) => p === min)[0];
  return { min, max, minDate };
}

function priceColor(price, min, max) {
  if (price === null) return 'bg-gray-700/50 text-gray-500';
  if (min === max) return 'bg-emerald-600/70 text-white';
  const ratio = (price - min) / (max - min);
  if (ratio <= 0.33) return 'bg-emerald-600/70 text-white';
  if (ratio <= 0.66) return 'bg-yellow-600/70 text-white';
  return 'bg-red-600/60 text-white';
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = flightData.routes.map(r => `
    <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
      <input type="checkbox" class="rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0" data-route="${r.id}" ${visibleRoutes.has(r.id) ? 'checked' : ''}>
      <span>${r.from} &rarr; ${r.to}</span>
    </label>
  `).join('');
  el.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) visibleRoutes.add(cb.dataset.route);
      else visibleRoutes.delete(cb.dataset.route);
      render();
    });
  });
}

function renderSummaryCards() {
  const el = document.getElementById('summary-cards');
  el.innerHTML = flightData.routes.filter(r => visibleRoutes.has(r.id)).map(r => {
    const { min, minDate } = getRouteStats(r);
    return `
      <div class="bg-[#2a2a3c] rounded-lg border border-[#3a3a4c] p-4 hover:border-indigo-500/50 transition-colors">
        <div class="text-xs text-gray-400 mb-1 truncate">${r.from} &rarr; ${r.to}</div>
        <div class="text-2xl font-bold ${min ? 'text-emerald-400' : 'text-gray-500'}">${min ? '$' + min : 'TBD'}</div>
        <div class="text-xs text-gray-500 mt-1">${minDate || 'No data yet'}</div>
        <div class="airline-badge mt-1">${r.airline}</div>
        <a href="${r.link}" target="_blank" rel="noopener" class="text-xs text-indigo-400 hover:text-indigo-300 mt-2 inline-block">Google Flights &rarr;</a>
      </div>`;
  }).join('');
}

function renderHeatmap() {
  const table = document.getElementById('heatmap');
  const visible = flightData.routes.filter(r => visibleRoutes.has(r.id));

  let html = '<thead><tr><th class="sticky left-0 bg-[#1e1e2e] z-10 text-left text-gray-400 font-medium px-2 py-2 min-w-[160px]">Route</th>';
  dates.forEach(d => {
    const short = d.replace('Apr ', '4/').replace('May ', '5/');
    html += `<th class="text-gray-400 font-medium px-1 py-2 text-center whitespace-nowrap">${short}</th>`;
  });
  html += '</tr></thead><tbody>';

  visible.forEach(r => {
    const { min, max } = getRouteStats(r);
    html += `<tr><td class="sticky left-0 bg-[#1e1e2e] z-10 px-2 py-2 text-xs font-medium whitespace-nowrap"><a href="${r.link}" target="_blank" rel="noopener" class="text-indigo-400 hover:text-indigo-300">${r.from.split(' ')[0]} &rarr; ${r.to.split(' ')[0]}</a><br><span class="airline-badge">${r.airline}</span></td>`;
    dates.forEach(d => {
      const p = r.prices[d];
      const color = priceColor(p, min, max);
      const tooltip = p !== null ? `$${p} CAD on ${d}` : 'Data not yet loaded';
      const display = p !== null ? '$' + p : '&mdash;';
      html += `<td class="px-1 py-1 text-center"><div class="price-cell ${color} rounded-md px-2 py-2 text-xs font-medium cursor-default" data-tooltip="${tooltip}">${display}</div></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

function renderChart() {
  const visible = flightData.routes.filter(r => visibleRoutes.has(r.id));
  const labels = visible.map(r => `${r.from.split(' ')[0]} → ${r.to.split(' ')[0]}`);
  const data = visible.map(r => getRouteStats(r).min);
  const colors = data.map(p => p ? 'rgba(99, 204, 163, 0.8)' : 'rgba(107, 114, 128, 0.4)');

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Cheapest Price (CAD)',
        data: data.map(d => d || 0),
        backgroundColor: colors,
        borderColor: colors.map(c => c.replace('0.8', '1').replace('0.4', '0.6')),
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw ? `$${ctx.raw} CAD` : 'No data'
          }
        }
      },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 11 } }, grid: { color: '#2a2a3c' } },
        y: { ticks: { color: '#9ca3af', callback: v => '$' + v }, grid: { color: '#2a2a3c' }, beginAtZero: true }
      }
    }
  });
}

function render() {
  renderSummaryCards();
  renderHeatmap();
  renderChart();
}

renderFilters();
render();
</script>
</body>
</html>
